services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lmd_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-lmd_db}
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      NODE_ENV: development
      PORT: 4000
      BACKEND_ROOT: /app
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@liblingua.org}
      LOG_DIR: /app/logs
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src       # hot-reload
      - ./backend/prisma:/app/prisma
      - ./scripts:/scripts
      - uploads_data_dev:/app/uploads
      - ./logs:/app/logs
    command: >
      sh -c "npx prisma db push &&
             node /scripts/seed.js &&
             npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:4000
    ports:
      - '5173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src      # hot-reload
      - ./frontend/public:/app/public

volumes:
  pgdata_dev:
  uploads_data_dev:
